name: Auto Key Checker
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# Гарантируем, что одновременно запускается только один экземпляр воркфлоу
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  check-keys:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Полная синхронизация с удалённой веткой
      - name: Force clean and reset to origin/main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          git clean -fdx

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create config_sources.json from VPN_SOURCES secret
        run: echo '${{ secrets.VPN_SOURCES }}' > config_sources.json

      - name: Update githubmirror (mirror.py)
        run: python mirror.py
        timeout-minutes: 30

      - name: Merge sources from proxy-collect manifest
        run: python proxy_collect_merge.py

      - name: Run Checker Script
        run: python main.py
        timeout-minutes: 45

      # Подтягиваем последние изменения (если за время выполнения скриптов кто-то запушил)
      - name: Pull latest changes with rebase
        run: |
          git pull --rebase origin main

      - name: Commit & Push Results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update keys & githubmirror"
          file_pattern: "."
          commit_user_name: "GitHub Actions Bot"
          commit_user_email: "actions@github.com"
          branch: main
          # skip_fetch: false  # по умолчанию false, можно не указывать или явно задать false
