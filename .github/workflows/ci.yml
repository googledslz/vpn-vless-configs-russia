name: Auto Key Checker
on:
  schedule:
    - cron: '0 */6 * * *'  # каждые 6 часов
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vpn-checker
  cancel-in-progress: true  # ✅ только один запуск одновременно

jobs:
  check-keys:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt requests

      - name: Create config_sources.json from VPN_SOURCES secret
        run: echo '${{ secrets.VPN_SOURCES }}' > config_sources.json

      - name: Update githubmirror (mirror.py)
        run: python mirror.py
        timeout-minutes: 30
        env:
          PYTHONUNBUFFERED: '1'

      - name: Merge sources from proxy-collect manifest
        run: python proxy_collect_merge.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Run Checker Script
        run: python main.py
        timeout-minutes: 45
        env:
          PYTHONUNBUFFERED: '1'

      - name: Commit & Push Results
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A
          # Коммитим только если есть изменения
          git diff --cached --quiet || git commit -m "🤖 Auto-update keys & githubmirror"
          # -X ours: при конфликтах всегда берём нашу (свежую) версию файлов
          git pull --rebase -X ours origin main
          git push origin main
