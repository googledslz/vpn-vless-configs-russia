name: Auto Key Checker
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-keys:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create config_sources.json from VPN_SOURCES secret
        run: echo '${{ secrets.VPN_SOURCES }}' > config_sources.json

      - name: Update githubmirror (mirror.py)
        run: python mirror.py
        timeout-minutes: 30
        env:
          PYTHONUNBUFFERED: '1'

      - name: Merge sources from proxy-collect manifest
        run: python proxy_collect_merge.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Run Checker Script
        run: python main.py
        timeout-minutes: 45
        env:
          PYTHONUNBUFFERED: '1'

      - name: Commit & Push Results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update keys & githubmirror"
          file_pattern: "."
          commit_user_name: "GitHub Actions Bot"
          commit_user_email: "actions@github.com"
          branch: main
          rebase: true        # вместо force-push делает pull --rebase
          # push_options: ''   # убираем force-push, так как он запрещён
