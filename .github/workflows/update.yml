name: Update VPN Configs
on:
  schedule:
    - cron: '0 */2 * * *'  # каждые 2 часа
  workflow_dispatch:     # ручной запуск

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install requests
      run: pip install requests
    
    - name: Create config_sources.txt from secret
      run: echo "${{ secrets.VPN_SOURCES }}" > config_sources.txt
    
    - name: Run mirror.py
      run: python mirror.py
    
    - name: Commit new configs
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add githubmirror/ clean/
        git commit -m "Auto-update $(date)" || exit 0
        git push
