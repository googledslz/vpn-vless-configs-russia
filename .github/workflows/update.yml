name: Update VPN Configs
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Create config_sources.json from secret
        run: echo '${{ secrets.VPN_SOURCES }}' > config_sources.json

      - name: Run mirror.py
        run: python mirror.py

      # ✅ КЛЮЧЕВОЙ ШАГ: удаляем все локальные коммиты (которые не были запушены)
      - name: Reset to origin/main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Commit new configs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update"
          file_pattern: "."                     # добавит всё, включая config_sources.json
          branch: main
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
