name: Convert extra mermeroo sources

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false    # новый запуск будет ждать, а не отменять текущий

jobs:
  convert-extra:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reset to origin/main (clean local state)
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Convert extra sources to URI list
        run: python convert_extra_sources.py

      - name: Pull latest changes (with autostash)
        run: git pull --rebase --autostash origin main

      - name: Commit & push converted list
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update extra converted sources"
          file_pattern: "extra_converted_for_mirror.txt"
          branch: main
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
